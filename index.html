<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous">

    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="img/icon.png" alt="Shop Management"
                        width="40" height="40"
                        class="d-inline-block align-text-top rounded-circle">
                    Shop Management
                </a>
                <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup"
                    aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link active" aria-current="page"
                            href="#">Home</a>
                        <a class="nav-link" href="#">Features</a>
                        <a class="nav-link" href="#">Pricing</a>
                        <a class="nav-link disabled"
                            aria-disabled="true">Disabled</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-10">
                    <div id="loading-state" class="text-center my-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-2">Fetching Inventory...</p>
                    </div>
                    <h2 class="text-center mb-4">Product Inventory</h2>

                    <div id="table-container" style="display: none;">

                        <div class="table-responsive">
                            <table class="table table-hover border shadow-sm">
                                <thead class="table-dark">
                                    <tr>
                                        <th scope="col">Product Image</th>
                                        <th scope="col">Title</th>
                                        <th scope="col">Price</th>
                                        <th scope="col">Category</th>
                                        <th scope="col">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="product-list">
                                </tbody>
                            </table>
                        </div>

                    </div>

                </div>
            </div>
        </div>

        <div class="container mt-4 mb-5">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0" id="form-title">Product Details</h5>
                </div>
                <div class="card-body">
                    <form id="product-form">
                        <input type="hidden" id="prod-id">

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="prod-title"
                                    class="form-label">Product Title</label>
                                <input type="text" class="form-control"
                                    id="prod-title"
                                    placeholder="Enter product name" required>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="prod-price" class="form-label">Price
                                    ($)</label>
                                <input type="number" class="form-control"
                                    id="prod-price" placeholder="0.00" required>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="prod-category"
                                    class="form-label">Category</label>
                                <select class="form-select" id="prod-category">
                                    <option value="beauty">Beauty</option>
                                    <option
                                        value="fragrances">Fragrances</option>
                                    <option value="furniture">Furniture</option>
                                    <option value="groceries">Groceries</option>
                                </select>
                            </div>
                        </div>

                        <div class="text-end">
                            <button type="button" class="btn btn-secondary"
                                onclick="resetForm()">Clear</button>
                            <button type="submit" class="btn btn-success"
                                id="save-btn">Save Product</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
        <script src="app.js"></script>
    </body>
</html>
